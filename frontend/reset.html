<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENU — Reset password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#fdc35f;--bg:#080705;--panel:#121110;--text:#f4efe4;--muted:#8a8278;--border:#232019;--green:#6ee7a0;--red:#fca5a5;--font:'Space Grotesk',system-ui,sans-serif}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:420px;width:100%;text-align:center;background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:46px 38px}
    .logo-name{font-family:'Times New Roman',Times,serif;font-size:2rem;font-weight:700;text-transform:lowercase;margin-bottom:20px;display:inline-block}
    h1{font-size:1.35rem;font-weight:700;margin-bottom:8px}
    p{color:var(--muted);line-height:1.6;margin-bottom:22px}
    .input{width:100%;padding:12px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;font-family:var(--font);font-size:0.92rem;color:var(--text);outline:none;margin-bottom:12px;transition:border-color .2s}
    .input:focus{border-color:var(--gold)}
    .input::placeholder{color:var(--muted)}
    .btn{width:100%;padding:12px;background:var(--gold);color:#161310;font-family:var(--font);font-weight:600;font-size:0.95rem;border:none;border-radius:999px;cursor:pointer;transition:transform .15s}
    .btn:hover{transform:translateY(-1px)}
    .msg{font-size:0.85rem;border-radius:8px;padding:9px 12px;margin-bottom:12px;display:none}
    .msg.err{display:block;color:var(--red);background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25)}
    .ok h1{color:var(--green)}
    .link{color:var(--gold);text-decoration:none;font-size:0.9rem}
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="card">
    <span class="logo-name">senu</span>

    <div id="form-wrap">
      <h1>Choose a new password</h1>
      <p>Enter a new password for your account.</p>
      <div class="msg err" id="err"></div>
      <input class="input" id="pw" type="password" placeholder="New password (min 6 chars)" />
      <input class="input" id="pw2" type="password" placeholder="Repeat password" />
      <button class="btn" id="go" onclick="doReset()">Set new password →</button>
    </div>

    <div id="done" class="ok hidden">
      <h1>Password updated ✓</h1>
      <p>You can now log in with your new password.</p>
      <a href="index.html" class="link">Go to SENU →</a>
    </div>
  </div>

  <script>
    const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:')
      ? 'http://localhost:8000'
      : 'https://senu-api.onrender.com';

    const token = new URLSearchParams(location.search).get('token');
    const err = document.getElementById('err');
    function showErr(m){ err.textContent = m; err.classList.add('err'); err.style.display='block'; }

    if(!token){ showErr('This reset link is missing its token. Request a new one from the login window.'); }

    async function doReset(){
      err.style.display='none';
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      if(pw.length < 6){ showErr('Password must be at least 6 characters.'); return; }
      if(pw !== pw2){ showErr('Passwords do not match.'); return; }
      const btn = document.getElementById('go'); btn.textContent = 'Saving…'; btn.disabled = true;
      try{
        const r = await fetch(`${API}/reset`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ token, password: pw })
        });
        if(r.ok){
          document.getElementById('form-wrap').classList.add('hidden');
          document.getElementById('done').classList.remove('hidden');
        }else{
          const d = await r.json().catch(()=>({}));
          showErr(d.detail || 'Could not reset password.');
          btn.textContent = 'Set new password →'; btn.disabled = false;
        }
      }catch(e){
        showErr('Could not reach the server. It may be waking up — try again in a minute.');
        btn.textContent = 'Set new password →'; btn.disabled = false;
      }
    }
  </script>
</body>
</html>
